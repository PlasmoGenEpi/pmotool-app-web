<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting…</title>
    <script>
      (function () {
        var base = "/";
        if (location.hostname.endsWith("github.io")) {
          var segment = location.pathname.split("/").filter(Boolean)[0];
          if (segment) {
            base = "/" + segment + "/";
          }
        }
        location.replace(base);
      })();
    </script>
  </head>
  <body></body>
</html>
