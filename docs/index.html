    <script type="module">
      import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/browser@1.2.0/build/stlite.js";
      mount(
        {
            "requirements": ['fuzzywuzzy==0.18.0', 'numpy==2.2.5', 'openpyxl==3.1.5', 'pandas==2.3.1', 'pmotools==1.1.0'],
            "entrypoint": "PMO_Builder.py",
            "files": {
                
                "PMO_Builder.py": "print(\"[pmo-build] pmotools-app=0fcf387bb2d473e90b032755821a9ecc3722421f\", flush=True)\n\nimport streamlit as st\nfrom src.format_page import render_header\n\n\ndef home() -> None:\n    render_header()\n    st.subheader(\"About the PMO Builder\", divider=\"gray\")\n    st.markdown(\n        \"\"\"\n        The **PMO Builder** is designed to help create and manage PMO\n        (Portable Microhaplotype Object) files from your own data to organize\n        and store information in a standardized format. This app simplifies the\n        conversion of your data from multiple tabular files (CSV, TSV, EXCEL) into the relational PMO format.\n        \"\"\"\n    )\n\n    st.subheader(\"Components\", divider=\"gray\")\n\n    st.markdown(\n        \"\"\"\n        As you move through the app you will put together the following information. Together these will make a complete PMO:\n        - **Panel Information**: A table including data on the targets that make up the panel, at minimum the panel name, target names and their primer pairs\n        - **Microhaplotype Information**: A table containing the alleles called for each of the samples for each of the targets and the read counts associated.\n\n\n        **Optionally, you can also add the following:**\n        - **Specimen Information (highly recommended)**: Metadata describing the biological specimens.\n        - **Project Information**: Information describing the project this data belongs to.\n        - **Library Sample Information**: Metadata describing each library created from a specimen.\n        - **Bioinformatics Information**: Information on the bioinformatics pipeline used to generate the allele data.\n        - **Sequencing Information**: Information on how the samples were sequenced.\n        - **Read Counts per Stage**: A table containing the raw read counts per sample and a table containing the read counts for each stage of the bioinformatics pipeline per sample per target.\n\n        More information on the file format can be found [here](https://plasmogenepi.github.io/PMO_Docs/)\n        \"\"\"\n    )\n\n    st.markdown(\n        \"If unfamiliar with the PMO format, you can download a template Excel file below to get started\"\n    )\n    with open(\"example_data/PMO_building_template.xlsx\", \"rb\") as f:\n        st.download_button(\n            label=\"Download PMO Excel template\",\n            data=f,\n            file_name=\"PMO_building_template.xlsx\",\n            mime=\"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet\",\n            icon=\":material/download:\",  # optional\n        )\n\n    st.subheader(\"How building your PMO will work\", divider=\"gray\")\n    st.markdown(\n        \"\"\"\n        For each of the components above you will either type information or upload it as a table. When uploading as a table you will...\n        - **Enter Data**: Upload data as tables with your version of the information.\n        - **Map Fields**: Map your data fields to match the PMO format.\n        - **Save Progress (Optional)**: If you may reuse the section (e.g. Panel Information) you can save it for future PMO file generation.\n\n        Once you have all of the parts together you can merge the parts and export your completed PMO file.\n        \"\"\"\n    )\n\n    st.markdown(\n        \"\"\"\n            ---\n            ### Ready to Get Started?\n            Select **Panel Information** from the sidebar (or click link below) to begin building your PMO file!\n            \"\"\"\n    )\n    st.page_link(\"app_pages/Panel_Information.py\", label=\"Panel Information\")\n\n\npages = {\n    \"Required\": [\n        st.Page(\"app_pages/Panel_Information.py\", title=\"Panel Information\"),\n        st.Page(\n            \"app_pages/Microhaplotype_Information.py\",\n            title=\"Microhaplotype Information\",\n        ),\n    ],\n    \"Optional\": [\n        st.Page(\n            \"app_pages/Specimen_Level_Metadata.py\", title=\"Specimen Level Metadata\"\n        ),\n        st.Page(\"app_pages/Project_Information.py\", title=\"Project Information\"),\n        st.Page(\n            \"app_pages/Library_Sample_Level_Metadata.py\",\n            title=\"Library Sample Level Metadata\",\n        ),\n        st.Page(\"app_pages/Sequencing_Information.py\", title=\"Sequencing Information\"),\n        st.Page(\n            \"app_pages/Bioinformatics_Information.py\",\n            title=\"Bioinformatics Information\",\n        ),\n        st.Page(\"app_pages/Read_Counts_per_Stage.py\", title=\"Read Counts per Stage\"),\n    ],\n    \"Finalize\": [\n        st.Page(\"app_pages/Create_Final_PMO.py\", title=\"Create Final PMO\"),\n    ],\n}\n\npg = st.navigation(\n    {\n        \"\": [st.Page(home, title=\"Home\", default=True)],\n        **pages,\n    }\n)\npg.run()\n",
                
                "app_pages/Bioinformatics_Information.py": "import streamlit as st\nimport pandas as pd\nfrom src.format_page import render_header\nfrom src.field_matcher import load_data\nfrom src.utils import load_schema\n\n\ndef parse_list_field(value):\n    \"\"\"\n    Parse a string that looks like a list into an actual list.\n    Splits on commas but respects quoted substrings (single or double quotes).\n    Parses character by character, toggling in_quote when a quote is encountered.\n\n    Examples:\n        \"[--illumina, '--qualThres 25,20']\" -> [\"--illumina\", \"--qualThres 25,20\"]\n        \"--illumina, --paired\" -> [\"--illumina\", \"--paired\"]\n        \"single_value\" -> \"single_value\" (returned as-is if no list-like structure)\n    \"\"\"\n    if not isinstance(value, str):\n        return value\n\n    stripped = value.strip()\n    if stripped.startswith(\"[\") and stripped.endswith(\"]\"):\n        stripped = stripped[1:-1].strip()\n    elif \",\" not in stripped:\n        return value\n\n    tokens = []\n    current = []\n    in_quote = False\n    quote_char = None\n\n    for char in stripped:\n        if char in ('\"', \"'\"):\n            if not in_quote:\n                # entering a quoted section\n                in_quote = True\n                quote_char = char\n                # don't append the quote char itself\n            elif char == quote_char:\n                # closing the quoted section\n                in_quote = False\n                quote_char = None\n                # don't append the quote char itself\n            else:\n                # different quote char inside a quoted section \u2014 treat as literal\n                current.append(char)\n        elif char == \",\" and not in_quote:\n            token = \"\".join(current).strip()\n            if token:\n                tokens.append(token)\n            current = []\n        else:\n            current.append(char)\n\n    # Don't forget the last token\n    last = \"\".join(current).strip()\n    if last:\n        tokens.append(last)\n\n    return tokens if len(tokens) > 1 else (tokens[0] if tokens else value)\n\n\nclass ValidationHelper:\n    \"\"\"Helper class for validation logic.\"\"\"\n\n    REQUIRED_FIELDS = [\"program\", \"program_version\"]\n\n    @staticmethod\n    def check_method_required_fields(method_dict, fields=None):\n        if fields is None:\n            fields = ValidationHelper.REQUIRED_FIELDS\n        missing_fields = [\n            f\n            for f in fields\n            if f not in method_dict\n            or not method_dict[f]\n            or str(method_dict[f]).strip() == \"\"\n        ]\n        return (True, []) if not missing_fields else (False, missing_fields)\n\n    @staticmethod\n    def validate_runs(bioinfo_run_vals, methods_list):\n        if not methods_list:\n            return False, [\n                \"No bioinformatics methods available. Please add at least one bioinformatics method before saving run information.\"\n            ]\n        missing_names, missing_methods, invalid_methods = [], [], []\n        methods_count = len(methods_list)\n        for i, run_val in enumerate(bioinfo_run_vals):\n            if not run_val.get(\"bioinformatics_run_name\", \"\").strip():\n                missing_names.append(i + 1)\n            methods_id = run_val.get(\"bioinformatics_methods_id\")\n            if methods_id is None:\n                missing_methods.append(i + 1)\n            elif not (0 <= methods_id < methods_count):\n                invalid_methods.append(i + 1)\n\n        errors = []\n        if missing_names:\n            errors.append(\n                f\"Run(s) {', '.join(map(str, missing_names))} missing a run name.\"\n            )\n        if missing_methods:\n            errors.append(\n                f\"Run(s) {', '.join(map(str, missing_methods))} missing a methods ID.\"\n            )\n        if invalid_methods:\n            errors.append(\n                f\"Run(s) {', '.join(map(str, invalid_methods))} have an invalid methods ID.\"\n            )\n        return len(errors) == 0, errors\n\n    @staticmethod\n    def validate_methods(bioinfo_method_infos):\n        methods_validation = {}\n        all_methods_valid = True\n        method_count = 0\n        if \"methods\" in bioinfo_method_infos:\n            for method_data in bioinfo_method_infos[\"methods\"]:\n                valid, missing = ValidationHelper.check_method_required_fields(\n                    method_data\n                )\n                methods_validation[method_count] = (valid, missing)\n                method_count += 1\n                if not valid:\n                    all_methods_valid = False\n        if method_count == 0:\n            all_methods_valid = False\n            methods_validation[\"_no_methods\"] = (\n                False,\n                [\"At least one method is required\"],\n            )\n        return methods_validation, all_methods_valid\n\n\nclass BioinformaticsRunManager:\n    \"\"\"Manages bioinformatics run information.\"\"\"\n\n    def __init__(\n        self,\n        required_fields,\n        required_alternate_fields,\n        optional_fields,\n        optional_alternate_fields,\n    ):\n        self.required_fields = required_fields\n        self.required_alternate_fields = required_alternate_fields\n        self.optional_fields = optional_fields\n        self.optional_alternate_fields = optional_alternate_fields\n\n    def _create_method_dropdown_options(self):\n        options = []\n        for idx, method in enumerate(st.session_state[\"bioinfo_methods_list\"]):\n            name = method.get(\"bioinformatics_method_name\", f\"unnamed method {idx+1}\")\n            options.append(f\"{idx}: {name}\")\n        return options\n\n    def _get_method_selection(self, i=None):\n        if not st.session_state.get(\"bioinfo_methods_list\"):\n            st.warning(\n                \"No bioinformatics methods available. Please add a method below.\"\n            )\n            return 0\n        options = self._create_method_dropdown_options()\n        key = (\n            f\"method_select_{i}_{len(options)}\"\n            if i is not None\n            else f\"method_select_{len(options)}\"\n        )\n        selected = st.selectbox(\"Bioinformatics Methods ID:\", options=options, key=key)\n        return int(selected.split(\":\")[0])\n\n    def _get_unique_bioinfo_run_names(self):\n        unique_names = []\n        if \"microhaplotype_info\" in st.session_state:\n            try:\n                mhap = st.session_state[\"microhaplotype_info\"]\n                if isinstance(mhap, dict) and \"detected_microhaplotypes\" in mhap:\n                    detected = mhap[\"detected_microhaplotypes\"]\n                    if isinstance(detected, list):\n                        names = [\n                            item.get(\"bioinformatics_run_name\")\n                            for item in detected\n                            if isinstance(item, dict)\n                            and item.get(\"bioinformatics_run_name\")\n                        ]\n                        unique_names = sorted(set(names))\n            except Exception:\n                pass\n        return unique_names\n\n    def _enter_run_values(self, i=None, prefill_name=None):\n        cols = st.columns(3)\n        with cols[0]:\n            bioinfo_run_name = st.text_input(\n                \"Bioinformatics Run Name:\",\n                value=prefill_name or \"\",\n                help=\"Name of the bioinformatics run (required).\",\n                key=f\"run_name_{i}\" if i is not None else \"run_name\",\n            )\n        with cols[1]:\n            bioinfo_methods_id = self._get_method_selection(i)\n        with cols[2]:\n            bioinfo_run_date = st.date_input(\n                \"Bioinformatics Run Date (Optional):\",\n                value=None,\n                key=f\"run_date_{i}\" if i is not None else \"run_date\",\n            )\n        run_dict = {\n            \"bioinformatics_run_name\": bioinfo_run_name,\n            \"bioinformatics_methods_id\": bioinfo_methods_id,\n        }\n        if bioinfo_run_date:\n            run_dict[\"run_date\"] = str(bioinfo_run_date)\n        return run_dict\n\n    def _save_runs(self, bioinfo_run_vals):\n        if st.button(\"Save Bioinformatics Run Info\", key=\"save_bioinfo_run_vals\"):\n            methods_list = st.session_state.get(\"bioinfo_methods_list\", [])\n            is_valid, errors = ValidationHelper.validate_runs(\n                bioinfo_run_vals, methods_list\n            )\n            if not is_valid:\n                for error in errors:\n                    st.error(error)\n            else:\n                st.session_state[\"bioinfo_run_infos\"] = bioinfo_run_vals\n                st.success(\"Bioinformatics run values saved successfully!\")\n\n    def _save_upload_runs(\n        self, df, mapped_fields, selected_optional_fields, selected_additional_fields\n    ):\n        \"\"\"Save uploaded run info rows, associating each with a chosen method.\"\"\"\n        if df is None or mapped_fields is None:\n            return\n\n        methods_list = st.session_state.get(\"bioinfo_methods_list\", [])\n        if not methods_list:\n            st.error(\"No bioinformatics methods available. Please add a method first.\")\n            return\n\n        method_options = self._create_method_dropdown_options()\n\n        # Determine the run name column for display\n        run_name_col = mapped_fields.get(\"bioinformatics_run_name\")\n\n        # Assignment mode\n        assignment_mode = st.radio(\n            \"Method assignment mode:\",\n            [\"Assign one method to all runs\", \"Assign method per run\"],\n            horizontal=True,\n            key=\"run_method_assignment_mode\",\n        )\n\n        if assignment_mode == \"Assign one method to all runs\":\n            methods_id = self._get_method_selection(i=\"upload\")\n            per_run_method_ids = None\n        else:\n            # Build a per-row assignment table\n            st.write(\"**Assign a method to each run:**\")\n            per_run_method_ids = []\n            for i, (_, row) in enumerate(df.iterrows()):\n                run_label = (\n                    str(row[run_name_col])\n                    if run_name_col and run_name_col in df.columns\n                    else f\"Row {i + 1}\"\n                )\n                col_label, col_select = st.columns([2, 3])\n                with col_label:\n                    st.markdown(f\"**{run_label}**\")\n                with col_select:\n                    selected = st.selectbox(\n                        \"Method:\",\n                        options=method_options,\n                        key=f\"per_run_method_{i}\",\n                        label_visibility=\"collapsed\",\n                    )\n                    per_run_method_ids.append(int(selected.split(\":\")[0]))\n            methods_id = None\n\n        if st.button(\n            \"Save Bioinformatics Run Info\", key=\"save_bioinfo_run_vals_upload\"\n        ):\n            try:\n                new_runs = []\n                for i, (_, row) in enumerate(df.iterrows()):\n                    entry = {}\n                    for pmo_field, input_field in mapped_fields.items():\n                        if input_field and input_field in df.columns:\n                            val = row[input_field]\n                            entry[pmo_field] = str(val) if pd.notna(val) else None\n                    if selected_optional_fields:\n                        for pmo_field, input_field in selected_optional_fields.items():\n                            if input_field and input_field in df.columns:\n                                val = row[input_field]\n                                entry[pmo_field] = str(val) if pd.notna(val) else None\n                    if selected_additional_fields:\n                        for field in selected_additional_fields:\n                            if field in df.columns:\n                                val = row[field]\n                                entry[field] = str(val) if pd.notna(val) else None\n                    entry = {\n                        k: v for k, v in entry.items() if v is not None and v != \"\"\n                    }\n                    entry[\"bioinformatics_methods_id\"] = (\n                        per_run_method_ids[i]\n                        if per_run_method_ids is not None\n                        else methods_id\n                    )\n                    new_runs.append(entry)\n\n                existing = st.session_state.get(\"bioinfo_run_infos\", [])\n                st.session_state[\"bioinfo_run_infos\"] = existing + new_runs\n                st.success(f\"Added {len(new_runs)} run(s) successfully!\")\n                st.info(\n                    f\"Total sequencing runs: {len(st.session_state['bioinfo_run_infos'])}\"\n                )\n            except Exception as e:\n                st.error(f\"Error saving run information: {e}\")\n\n    def add_runs(self):\n        st.subheader(\"Add Bioinformatics Run Information\")\n        run_input_mode = st.radio(\n            \"Run information input method:\",\n            [\"Enter Manually\", \"Upload File\"],\n            horizontal=True,\n            key=\"run_input_mode\",\n        )\n\n        if run_input_mode == \"Enter Manually\":\n            unique_run_names = self._get_unique_bioinfo_run_names()\n            default_num = len(unique_run_names) if unique_run_names else 1\n            if unique_run_names:\n                st.info(\n                    f\"Found {len(unique_run_names)} unique run name(s) in microhaplotype data \u2014 pre-filled below.\"\n                )\n            number_inputs = st.number_input(\n                \"Number of bioinformatics runs\",\n                min_value=0,\n                value=default_num,\n                key=\"num_bioinfo_runs\",\n            )\n            bioinfo_run_vals = [\n                self._enter_run_values(\n                    i=i,\n                    prefill_name=unique_run_names[i]\n                    if i < len(unique_run_names)\n                    else None,\n                )\n                for i in range(number_inputs)\n            ]\n            self._save_runs(bioinfo_run_vals)\n\n        else:  # Upload File\n            (\n                df,\n                mapped_fields,\n                selected_optional_fields,\n                selected_additional_fields,\n            ) = load_data(\n                self.required_fields,\n                self.required_alternate_fields,\n                self.optional_fields,\n                self.optional_alternate_fields,\n                key_suffix=\"bioinfo_run\",\n            )\n            self._save_upload_runs(\n                df, mapped_fields, selected_optional_fields, selected_additional_fields\n            )\n\n    def preview_runs(self):\n        if \"bioinfo_run_infos\" in st.session_state:\n            preview_toggle = st.toggle(\n                \"Preview Bioinformatics Run Information\",\n                key=\"preview_bioinfo_runs_toggle\",\n            )\n            if preview_toggle:\n                st.json(st.session_state[\"bioinfo_run_infos\"])\n\n\nclass BioinformaticsMethodManager:\n    \"\"\"Manages bioinformatics method information.\"\"\"\n\n    def __init__(\n        self,\n        required_fields,\n        required_alternate_fields,\n        optional_fields,\n        optional_alternate_fields,\n    ):\n        self.required_fields = required_fields\n        self.required_alternate_fields = required_alternate_fields\n        self.optional_fields = optional_fields\n        self.optional_alternate_fields = optional_alternate_fields\n        self.bioinfo_method_infos = {}\n\n    def _show_methods_count(self):\n        if st.session_state.get(\"bioinfo_methods_list\"):\n            st.info(f\"Current methods: {len(st.session_state['bioinfo_methods_list'])}\")\n\n    def _get_method_name_input(self):\n        st.subheader(\"Pipeline (Optional)\")\n        st.write(\n            \"Putting in the pipeline information is optional. If you add information you must add both program and program version.\"\n        )\n        pipeline_dict = self._create_method_step_input_fields(0)\n        return pipeline_dict[\"program\"], pipeline_dict\n\n    def _create_method_step_input_fields(self, method):\n        cols1 = st.columns(2)\n        with cols1[0]:\n            program = st.text_input(\n                \"program\",\n                key=f\"{method}_program\",\n                help=\"Name of the software tool (e.g. 'DADA2')\",\n            )\n        with cols1[1]:\n            version = st.text_input(\n                \"program version\",\n                key=f\"{method}_version\",\n                help=\"Version number (e.g. '1.16.0')\",\n            )\n        cols2 = st.columns(2)\n        with cols2[0]:\n            description = st.text_input(\n                \"program description (optional)\", key=f\"{method}_description\"\n            )\n        with cols2[1]:\n            additional_argument = st.text_input(\n                \"additional arguments (optional)\", key=f\"{method}_additional_argument\"\n            )\n        program_url = st.text_input(\n            \"program url (optional)\", key=f\"{method}_program_url\"\n        )\n        return {\n            \"program\": program,\n            \"program_version\": version,\n            \"program_description\": description,\n            \"additional_argument\": additional_argument,\n            \"program_url\": program_url,\n        }\n\n    def _build_method_step_dict(self, inputs):\n        step_dict = {\n            \"program\": inputs[\"program\"],\n            \"program_version\": inputs[\"program_version\"],\n        }\n        for field in [\"additional_argument\", \"program_description\", \"program_url\"]:\n            if inputs.get(field, \"\").strip():\n                step_dict[field] = inputs[field]\n        return step_dict\n\n    def _add_additional_fields(self, method, method_dict):\n        if st.toggle(f\"Add additional fields to {method}\", key=f\"{method}_toggle\"):\n            number_inputs = st.number_input(\n                \"Number of additional inputs\",\n                min_value=0,\n                value=1,\n                key=f\"{method}_num_fields\",\n            )\n            cols = st.columns(2)\n            with cols[0]:\n                field_names = [\n                    st.text_input(f\"Field Name {i}\", key=f\"field_name_{method}_{i}\")\n                    for i in range(number_inputs)\n                ]\n            with cols[1]:\n                field_values = [\n                    st.text_input(f\"Value {i}\", key=f\"value_{method}_{i}\")\n                    for i in range(number_inputs)\n                ]\n            for name, value in zip(field_names, field_values):\n                if name and name.strip():\n                    method_dict[name] = value\n        return method_dict\n\n    def _enter_method_step_info(self, method):\n        inputs = self._create_method_step_input_fields(method)\n        method_dict = self._build_method_step_dict(inputs)\n        return self._add_additional_fields(method, method_dict)\n\n    def _create_methods_steps(self):\n        st.subheader(\"Bioinformatics Method Steps\")\n        number_of_steps = st.number_input(\n            \"Number of bioinformatics steps:\",\n            min_value=1,\n            value=1,\n            key=\"num_bioinformatics_methods\",\n        )\n        return [\n            self._enter_method_step_info(f\"method_{i}\") for i in range(number_of_steps)\n        ]\n\n    def _build_methods_from_upload(\n        self,\n        df,\n        mapped_fields,\n        selected_optional_fields,\n        selected_additional_fields,\n        grouping_col,\n    ):\n        \"\"\"\n        Build a list of method dicts from an uploaded file.\n        If grouping_col is set, each unique value becomes a separate method entry\n        (bioinformatics_method_name = group value, methods = rows in that group).\n        Otherwise all rows go into one method entry.\n        \"\"\"\n\n        def _row_to_step(row):\n            step = {}\n            for pmo_field, input_field in mapped_fields.items():\n                if input_field and input_field in df.columns:\n                    val = row[input_field]\n                    step[pmo_field] = str(val) if pd.notna(val) else None\n            if selected_optional_fields:\n                for pmo_field, input_field in selected_optional_fields.items():\n                    if input_field and input_field in df.columns:\n                        val = row[input_field]\n                        if pd.notna(val):\n                            parsed = parse_list_field(str(val))\n                            # Apply list parsing only to additional_argument field\n                            step[pmo_field] = (\n                                parsed\n                                if pmo_field == \"additional_argument\"\n                                else str(val)\n                            )\n                        else:\n                            step[pmo_field] = None\n            if selected_additional_fields:\n                for field in selected_additional_fields:\n                    if field in df.columns and field != grouping_col:\n                        val = row[field]\n                        step[field] = str(val) if pd.notna(val) else None\n            return {k: v for k, v in step.items() if v is not None and v != \"\"}\n\n        if grouping_col and grouping_col in df.columns:\n            method_list = []\n            for group_val, group_df in df.groupby(grouping_col, sort=False):\n                steps = [_row_to_step(row) for _, row in group_df.iterrows()]\n                method_entry = {\n                    \"bioinformatics_method_name\": str(group_val),\n                    \"methods\": steps,\n                }\n                method_list.append(method_entry)\n            return method_list\n        else:\n            steps = [_row_to_step(row) for _, row in df.iterrows()]\n            return [{\"methods\": steps}]\n\n    def add_methods_information(self):\n        st.subheader(\"Add Bioinformatics Method Information\", divider=\"gray\")\n        self._show_methods_count()\n        add_method_toggle = st.checkbox(\n            \"Add New Bioinformatics Method\",\n            key=\"add_new_bioinfo_method_checkbox\",\n        )\n        if add_method_toggle:\n            method_input_mode = st.radio(\n                \"Method information input method:\",\n                [\"Enter Manually\", \"Upload File\"],\n                horizontal=True,\n                key=\"method_input_mode\",\n            )\n\n            if method_input_mode == \"Enter Manually\":\n                method_name, _ = self._get_method_name_input()\n                method_steps = self._create_methods_steps()\n                self.bioinfo_method_infos = {\"methods\": method_steps}\n                if method_name and method_name.strip():\n                    self.bioinfo_method_infos[\n                        \"bioinformatics_method_name\"\n                    ] = method_name\n            else:  # Upload File\n                (\n                    df,\n                    mapped_fields,\n                    selected_optional_fields,\n                    selected_additional_fields,\n                ) = load_data(\n                    self.required_fields,\n                    self.required_alternate_fields,\n                    self.optional_fields,\n                    self.optional_alternate_fields,\n                    key_suffix=\"bioinfo_methods\",\n                )\n                self.bioinfo_method_infos = {}\n                self._upload_df = df\n                self._upload_mapped = mapped_fields\n                self._upload_optional = selected_optional_fields\n                self._upload_additional = selected_additional_fields\n\n                if df is not None:\n                    # Grouping column selector \u2014 shown after file is loaded\n                    st.write(\"**Optional: select a grouping column**\")\n                    st.write(\n                        \"If selected, each unique value in this column becomes a separate method entry \"\n                        \"and its value is used as the `bioinformatics_method_name`.\"\n                    )\n                    grouping_options = [\"None\"] + df.columns.tolist()\n                    grouping_col = st.selectbox(\n                        \"Grouping column:\",\n                        grouping_options,\n                        key=\"methods_grouping_col\",\n                    )\n                    self._grouping_col = (\n                        None if grouping_col == \"None\" else grouping_col\n                    )\n                else:\n                    self._grouping_col = None\n        else:\n            self.bioinfo_method_infos = {}\n\n    def save_method(self):\n        \"\"\"Save method \u2014 handles both manual and upload paths.\"\"\"\n        # Detect which mode we're in by checking for upload state\n        if hasattr(self, \"_upload_df\") and self._upload_df is not None:\n            # Upload path\n            if st.button(\n                \"Save Bioinformatics Method(s)\", key=\"save_bioinfo_method_infos\"\n            ):\n                try:\n                    method_list = self._build_methods_from_upload(\n                        self._upload_df,\n                        self._upload_mapped,\n                        self._upload_optional,\n                        self._upload_additional,\n                        self._grouping_col,\n                    )\n                    # Validate each method entry\n                    all_valid = True\n                    for entry in method_list:\n                        for step in entry.get(\"methods\", []):\n                            (\n                                valid,\n                                missing,\n                            ) = ValidationHelper.check_method_required_fields(step)\n                            if not valid:\n                                st.error(\n                                    f\"Step missing required fields {missing} in method '{entry.get('bioinformatics_method_name', 'unnamed')}'\"\n                                )\n                                all_valid = False\n\n                    if all_valid:\n                        existing = st.session_state.get(\"bioinfo_methods_list\", [])\n                        st.session_state[\"bioinfo_methods_list\"] = (\n                            existing + method_list\n                        )\n                        st.success(\n                            f\"Added {len(method_list)} method group(s) successfully!\"\n                        )\n                        st.info(\n                            f\"Total available methods: {len(st.session_state['bioinfo_methods_list'])}\"\n                        )\n                        st.rerun()\n                except Exception as e:\n                    st.error(f\"Error saving methods: {e}\")\n\n        elif self.bioinfo_method_infos:\n            # Manual path\n            if st.button(\"Save Bioinformatics Method\", key=\"save_bioinfo_method_infos\"):\n                methods_validation, all_valid = ValidationHelper.validate_methods(\n                    self.bioinfo_method_infos\n                )\n                if all_valid:\n                    if \"bioinfo_methods_list\" not in st.session_state:\n                        st.session_state[\"bioinfo_methods_list\"] = []\n                    st.session_state[\"bioinfo_methods_list\"].append(\n                        self.bioinfo_method_infos\n                    )\n                    st.success(\"Bioinformatics method added successfully!\")\n                    st.info(\n                        f\"Total available methods: {len(st.session_state['bioinfo_methods_list'])}\"\n                    )\n                    st.rerun()\n                else:\n                    for method_id, (valid, missing) in methods_validation.items():\n                        if not valid:\n                            if method_id == \"_no_methods\":\n                                st.error(\n                                    \"At least one bioinformatics method is required.\"\n                                )\n                            else:\n                                st.error(\n                                    f\"Step '{method_id+1}' missing required fields: {', '.join(missing)}\"\n                                )\n                    st.warning(\"Please fill in all required fields before saving.\")\n\n    def _create_remove_options(self):\n        return [\n            f\"{idx}: {m.get('bioinformatics_method_name', f'unnamed method {idx+1}')}\"\n            for idx, m in enumerate(st.session_state[\"bioinfo_methods_list\"])\n        ]\n\n    def _update_run_info_indices(self, removed_indices):\n        if \"bioinfo_run_infos\" not in st.session_state:\n            return\n        updated, affected = [], []\n        for i, run in enumerate(st.session_state[\"bioinfo_run_infos\"]):\n            current_id = run.get(\"bioinformatics_methods_id\", 0)\n            if current_id in removed_indices:\n                affected.append(run.get(\"bioinformatics_run_name\", f\"Run {i+1}\"))\n            adjustment = sum(1 for r in removed_indices if r < current_id)\n            new_id = max(0, current_id - adjustment)\n            updated_run = run.copy()\n            updated_run[\"bioinformatics_methods_id\"] = new_id\n            updated.append(updated_run)\n        st.session_state[\"bioinfo_run_infos\"] = updated\n        if affected:\n            st.warning(f\"Updated method references for runs: {', '.join(affected)}\")\n\n    def remove_methods_section(self):\n        if not st.session_state.get(\"bioinfo_methods_list\"):\n            return\n        st.subheader(\"Remove Methods\")\n        if st.checkbox(\n            \"Remove Existing Methods\", key=\"remove_existing_methods_checkbox\"\n        ):\n            options = self._create_remove_options()\n            selected = st.multiselect(\n                \"Select methods to remove:\",\n                options=options,\n                key=\"select_methods_to_remove_multiselect\",\n            )\n            if selected and st.button(\n                \"Remove Selected Methods\",\n                type=\"secondary\",\n                key=\"remove_selected_methods_button\",\n            ):\n                indices = sorted([int(o.split(\":\")[0]) for o in selected], reverse=True)\n                original = sorted(indices)\n                for idx in indices:\n                    if 0 <= idx < len(st.session_state[\"bioinfo_methods_list\"]):\n                        removed = st.session_state[\"bioinfo_methods_list\"].pop(idx)\n                        st.success(\n                            f\"Removed: {removed.get('bioinformatics_method_name', f'Method {idx}')}\"\n                        )\n                self._update_run_info_indices(original)\n                st.info(\n                    f\"Remaining methods: {len(st.session_state['bioinfo_methods_list'])}\"\n                )\n                st.rerun()\n\n    def preview_methods(self):\n        if st.session_state.get(\"bioinfo_methods_list\"):\n            if st.toggle(\n                \"Preview Bioinformatics Methods List\",\n                key=\"preview_bioinfo_methods_toggle\",\n            ):\n                for idx, method in enumerate(st.session_state[\"bioinfo_methods_list\"]):\n                    st.write(f\"**Method Set {idx}:**\")\n                    st.json(method)\n                    st.write(\"---\")\n\n\nclass BioInfoPage:\n    def __init__(\n        self,\n        run_required,\n        run_required_alt,\n        run_optional,\n        run_optional_alt,\n        methods_required,\n        methods_required_alt,\n        methods_optional,\n        methods_optional_alt,\n    ):\n        self.run_manager = BioinformaticsRunManager(\n            run_required, run_required_alt, run_optional, run_optional_alt\n        )\n        self.method_manager = BioinformaticsMethodManager(\n            methods_required,\n            methods_required_alt,\n            methods_optional,\n            methods_optional_alt,\n        )\n\n    def display_info(self):\n        if st.session_state.get(\"bioinfo_methods_list\") or st.session_state.get(\n            \"bioinfo_run_infos\"\n        ):\n            st.subheader(\"Preview Bioinformatics Information\", divider=\"gray\")\n            self.run_manager.preview_runs()\n            self.method_manager.preview_methods()\n\n    def run(self):\n        self.run_manager.add_runs()\n        self.method_manager.add_methods_information()\n        self.method_manager.save_method()\n        self.method_manager.remove_methods_section()\n        self.display_info()\n\n\n# Initialize and run the app\nif __name__ in (\"__main__\", \"__page__\"):\n    render_header()\n    st.subheader(\"Bioinformatics Run Information\", divider=\"gray\")\n    schema_fields = load_schema()\n\n    run_required = schema_fields[\"bioinformatics_run_info\"][\"required\"]\n    run_required_alt = schema_fields[\"bioinformatics_run_info\"][\"required_alternatives\"]\n    run_optional = schema_fields[\"bioinformatics_run_info\"][\"optional\"]\n    run_optional_alt = schema_fields[\"bioinformatics_run_info\"][\"optional_alternatives\"]\n\n    methods_required = schema_fields[\"bioinformatics_methods_info\"][\"required\"]\n    methods_required_alt = schema_fields[\"bioinformatics_methods_info\"][\n        \"required_alternatives\"\n    ]\n    methods_optional = schema_fields[\"bioinformatics_methods_info\"][\"optional\"]\n    methods_optional_alt = schema_fields[\"bioinformatics_methods_info\"][\n        \"optional_alternatives\"\n    ]\n\n    app = BioInfoPage(\n        run_required,\n        run_required_alt,\n        run_optional,\n        run_optional_alt,\n        methods_required,\n        methods_required_alt,\n        methods_optional,\n        methods_optional_alt,\n    )\n    app.run()\n",
                
                "app_pages/Create_Final_PMO.py": "import streamlit as st\nimport json\nimport os\nfrom src.format_page import render_header\nfrom pmotools.pmo_builder.merge_to_pmo import merge_to_pmo\nfrom jsonschema import ValidationError\nfrom pmotools.pmo_engine.pmo_checker import PMOChecker, load_schema\nimport warnings\n\n\noptional_check_dict = {\n    \"project_info\": \"Project Information\",\n    \"specimen_info\": \"Specimen Level Metadata\",\n    \"library_sample_info\": \"Library Sample Level Metadata\",\n    \"seq_info\": \"Sequencing Information\",\n    \"bioinfo_run_infos\": \"Bioinformatics Runs Information\",\n    \"read_counts_per_stage\": \"Read Counts per Stage\",\n}\n\ncheck_dict = {\n    \"panel_info\": \"Panel Information\",\n    \"microhaplotype_info\": \"Microhaplotype Information\",\n}\n\n\ndef check_all(check_dict, optional_check_dict):\n    \"\"\"\n    checks if outputs of a given page exists, and refers user to the page to\n    populate if the page doesn't exist\n    \"\"\"\n    all_passed = True\n    for check_key, source_page in check_dict.items():\n        if check_key in st.session_state:\n            st.success(f\"Data from {source_page} tab has been successfully loaded.\")\n        else:\n            st.error(\n                f\"Data from {source_page} tab not found. Please fill out\"\n                f\" the {source_page} tab (the link is at the left side of this\"\n                \" page) before proceeding\"\n            )\n            all_passed = False\n    for check_key, source_page in optional_check_dict.items():\n        if check_key in st.session_state:\n            st.success(f\"Data from {source_page} tab has been successfully loaded.\")\n        else:\n            st.warning(\n                f\"Optional Data from {source_page} not found, will not be included in PMO\"\n            )\n    return all_passed\n\n\ndef merge_data():\n    # MERGE DATA\n    st.subheader(\"Merge Components to Final PMO\")\n    panel_info = st.session_state[\"panel_info\"]\n\n    # Get bioinformatics methods and runs if present\n    bioinfo_methods = None\n    if \"bioinfo_methods_list\" in st.session_state:\n        bioinfo_methods = st.session_state.get(\"bioinfo_methods_list\", [])\n    bioinfo_runs = None\n    if \"bioinfo_methods_list\" in st.session_state:\n        bioinfo_runs = st.session_state.get(\"bioinfo_run_infos\", [])\n    if \"read_counts_per_stage\" in st.session_state:\n        read_counts_per_stage = st.session_state[\"read_counts_per_stage\"]\n    else:\n        read_counts_per_stage = None\n    if \"project_info\" in st.session_state:\n        project_info = st.session_state[\"project_info\"]\n    else:\n        project_info = None\n    if \"seq_info\" in st.session_state:\n        seq_info = st.session_state[\"seq_info\"]\n    else:\n        seq_info = None\n    if st.button(\"Merge Data\"):\n        try:\n            if (\n                \"specimen_info\" not in st.session_state\n                and \"library_sample_info\" not in st.session_state\n            ):\n                spec_info = None\n                lib_info = None\n            elif (\n                \"specimen_info\" in st.session_state\n                and \"library_sample_info\" not in st.session_state\n            ):\n                spec_info = st.session_state[\"specimen_info\"]\n                lib_info = None\n            elif (\n                \"specimen_info\" not in st.session_state\n                and \"library_sample_info\" in st.session_state\n            ):\n                # in this instance, the default specimen_info will just bhe library_sample_info 1:1\n                spec_info = None\n                lib_info = st.session_state[\"library_sample_info\"]\n            else:\n                spec_info = st.session_state[\"specimen_info\"]\n                lib_info = st.session_state[\"library_sample_info\"]\n            with warnings.catch_warnings(record=True) as caught:\n                warnings.simplefilter(\"always\")\n                st.session_state[\"formatted_pmo\"] = merge_to_pmo(\n                    specimen_info=spec_info,\n                    library_sample_info=lib_info,\n                    sequencing_info=seq_info,\n                    panel_target_info=panel_info,\n                    mhap_info=st.session_state[\"microhaplotype_info\"],\n                    bioinfo_method_info=bioinfo_methods,\n                    bioinfo_run_info=bioinfo_runs,\n                    project_info=project_info,\n                    read_counts_by_stage_info=read_counts_per_stage,\n                )\n            st.success(\"Data merged successfully!\")\n            # Report any non-fatal warnings\n            if caught:\n                with st.expander(\n                    f\"{len(caught)} warning(s) during merge\", expanded=True\n                ):\n                    for w in caught:\n                        st.warning(str(w.message))\n\n            # --- Merge summary ---\n            pmo = st.session_state[\"formatted_pmo\"]\n\n            def _count(key, nested_key=None):\n                \"\"\"Return len of pmo[key] or pmo[key][nested_key], defaulting to 0.\"\"\"\n                val = pmo.get(key)\n                if val is None:\n                    return 0\n                if nested_key is not None:\n                    val = val.get(nested_key) if isinstance(val, dict) else None\n                    if val is None:\n                        return 0\n                return len(val) if hasattr(val, \"__len__\") else 0\n\n            # Always-present fields\n            library_samples_with_detected_count = 0\n            for detected in pmo.get(\"detected_microhaplotypes\", []):\n                library_samples_with_detected_count += len(detected[\"library_samples\"])\n\n            always_present = [\n                (_count(\"specimen_info\"), \"specimen(s)\"),\n                (_count(\"library_sample_info\"), \"library sample(s)\"),\n                (\n                    library_samples_with_detected_count,\n                    \"library sample(s) with detected microhaplotypes\",\n                ),\n                (_count(\"panel_info\"), \"panel(s)\"),\n                (_count(\"target_info\"), \"target(s)\"),\n                (\n                    _count(\"representative_microhaplotypes\", \"targets\"),\n                    \"target(s) with microhaplotype calls\",\n                ),\n            ]\n            library_samples_with_read_counts_per_stage = 0\n            for reads_by_stage in pmo.get(\"read_counts_by_stage\", []):\n                library_samples_with_read_counts_per_stage += len(\n                    reads_by_stage[\"read_counts_by_library_sample_by_stage\"]\n                )\n\n            # Optional fields (show 0 if absent)\n            optional = [\n                (_count(\"targeted_genomes\"), \"genome(s)\"),\n                (_count(\"sequencing_info\"), \"sequencing run(s)\"),\n                (_count(\"project_info\"), \"project(s)\"),\n                (_count(\"bioinformatics_run_info\"), \"bioinformatics run(s)\"),\n                (\n                    library_samples_with_read_counts_per_stage,\n                    \"library sample(s) with read counts per stage\",\n                ),\n            ]\n\n            st.markdown(\"**Merge Summary**\")\n            for count, label in always_present + optional:\n                st.markdown(f\"- Loaded **{count}** {label}\")\n        except Exception as e:\n            with st.expander(\"Error merging data\", expanded=True):\n                st.error(str(e))\n\n    # Download button - only show if PMO has been created\n    if \"formatted_pmo\" in st.session_state:\n        # Validate PMO\n        st.subheader(\"Validate PMO File\")\n        avail_versions = [\"v1.0.0\", \"v1.1.0\"]\n        schema_version = st.selectbox(\n            \"Select schema version\", avail_versions, index=len(avail_versions) - 1\n        )\n\n        if st.button(\"Validate PMO against schema\"):\n            try:\n                pmo_jsonschema_data_ = load_schema(\n                    f\"portable_microhaplotype_object_{schema_version}.schema.json\"\n                )\n                pmo_checker = PMOChecker(pmo_jsonschema_data_)\n                pmo_checker.validate_pmo_json(st.session_state[\"formatted_pmo\"])\n                st.success(\"\u2705 Valid PMO \u2014 passed schema validation.\")\n            except ValidationError as e:\n                # Build a detailed error message matching the CLI output\n                path_str = (\n                    \" -> \".join(str(p) for p in e.absolute_path)\n                    if e.absolute_path\n                    else \"root\"\n                )\n                schema_path_str = \" -> \".join(str(p) for p in e.absolute_schema_path)\n                detailed_msg = (\n                    f\"**Message:** {e.message}\\n\\n\"\n                    f\"**Instance path:** `{path_str}`\\n\\n\"\n                    f\"**Schema path:** `{schema_path_str}`\\n\\n\"\n                    f\"**Failing value:** `{e.instance}`\"\n                )\n                st.error(\"\u274c Schema validation failed:\")\n                st.markdown(detailed_msg)\n                with st.expander(\"Full validation error\", expanded=True):\n                    st.code(str(e), language=\"text\")\n            except Exception as e:\n                st.error(f\"\u274c Validation error: {e}\")\n\n        st.subheader(\"Download PMO File\")\n\n        # Convert the PMO data to JSON string\n        pmo_json = json.dumps(st.session_state[\"formatted_pmo\"], indent=2, default=str)\n\n        # Create a download button\n        st.download_button(\n            label=\"Download PMO JSON File\",\n            data=pmo_json,\n            file_name=\"pmo_data.json\",\n            mime=\"application/json\",\n            help=\"Download the merged PMO data as a JSON file\",\n        )\n\n        # Optional: Show preview of the data\n        with st.expander(\"Preview PMO Data\"):\n            st.json(st.session_state[\"formatted_pmo\"])\n\n\n# Initialize and run the app\nif __name__ in (\"__main__\", \"__page__\"):\n    current_directory = os.getcwd()  # Get the current working directory\n    SAVE_DIR = os.path.join(current_directory, \"finished_PMO_files\")\n    os.makedirs(SAVE_DIR, exist_ok=True)\n    render_header()\n    st.subheader(\"Create Final PMO\", divider=\"gray\")\n    st.subheader(\"Components\")\n    if check_all(check_dict, optional_check_dict):\n        merge_data()\n",
                
                "app_pages/Library_Sample_Level_Metadata.py": "import streamlit as st\nfrom src.format_page import render_header\nfrom src.field_matcher import load_data\nfrom src.transformer import transform_library_sample_info\nfrom src.utils import load_schema\n\nsession_name = \"library_sample_info\"\ntitle = \"library sample level metadata\"\n\n\nclass LibrarySampleMetadataPageMetadataPage:\n    def __init__(\n        self,\n        required_fields,\n        required_alternate_fields,\n        optional_fields,\n        optional_alternate_fields,\n    ):\n        self.required_fields = required_fields\n        self.required_alternate_fields = required_alternate_fields\n        self.optional_fields = optional_fields\n        self.optional_alternate_fields = optional_alternate_fields\n\n    def transform_and_save_data(\n        self, df, mapped_fields, selected_optional_fields, selected_additional_fields\n    ):\n        if mapped_fields and selected_optional_fields != \"Error\":\n            st.subheader(\"Transform Data\")\n            if st.button(\"Transform Data\"):\n                transformed_df = transform_library_sample_info(\n                    df.astype(object),\n                    mapped_fields,\n                    selected_optional_fields,\n                    selected_additional_fields,\n                )\n                st.session_state[\"library_sample_info\"] = transformed_df\n                try:\n                    st.success(\"Library Sample Information has been saved!\")\n                except Exception as e:\n                    st.error(f\"Error saving Library Sample Information: {e}\")\n\n    def display_panel_info(self, toggle_text):\n        if session_name in st.session_state:\n            preview = st.toggle(toggle_text)\n            if preview:\n                st.write(f\"Current {title}:\")\n                st.json(st.session_state[session_name])\n\n    def run(self):\n        # File upload\n        (\n            df,\n            mapped_fields,\n            selected_optional_fields,\n            selected_additional_fields,\n        ) = load_data(\n            required_fields,\n            required_alternate_fields,\n            optional_fields,\n            optional_alternate_fields,\n        )\n        # Transform and save data\n        self.transform_and_save_data(\n            df, mapped_fields, selected_optional_fields, selected_additional_fields\n        )\n        # Display current panel information\n        self.display_panel_info(f\"Preview {title}\")\n\n\nif __name__ in (\"__main__\", \"__page__\"):\n    render_header()\n    st.subheader(\"Library Sample Level Metadata Converter\", divider=\"gray\")\n    schema_fields = load_schema()\n    required_fields = schema_fields[\"library_sample_level_metadata\"][\"required\"]\n    required_alternate_fields = schema_fields[\"library_sample_level_metadata\"][\n        \"required_alternatives\"\n    ]\n    optional_fields = schema_fields[\"library_sample_level_metadata\"][\"optional\"]\n    optional_alternate_fields = schema_fields[\"library_sample_level_metadata\"][\n        \"optional_alternatives\"\n    ]\n    app = LibrarySampleMetadataPageMetadataPage(\n        required_fields,\n        required_alternate_fields,\n        optional_fields,\n        optional_alternate_fields,\n    )\n    if session_name in st.session_state:\n        st.success(\n            f\"Your {title} has already been saved during a\" \" previous run of this page\"\n        )\n        if st.button(\"Clear Previous Info\", type=\"secondary\"):\n            del st.session_state[session_name]\n            st.rerun()\n        app.display_panel_info(f\"Preview previously stored {title}\")\n    app.run()\n",
                
                "app_pages/Microhaplotype_Information.py": "import streamlit as st\nfrom src.format_page import render_header\nfrom src.field_matcher import load_data\nfrom src.transformer import transform_mhap_info\nfrom src.utils import load_schema\n\nsession_name = \"microhaplotype_info\"\ntitle = \"microhaplotype information\"\n\n\nclass MicrohaplotypeInfoPage:\n    def __init__(\n        self,\n        required_fields,\n        required_alternate_fields,\n        optional_fields,\n        optional_alternate_fields,\n    ):\n        self.required_fields = required_fields\n        self.required_alternate_fields = required_alternate_fields\n        self.optional_fields = optional_fields\n        self.optional_alternate_fields = optional_alternate_fields\n\n    def bioinfo_id_input(self, df):\n        \"\"\"Get bioinformatics ID from user - either from a column or as a string.\"\"\"\n        st.subheader(\"Bioinformatics ID (Optional)\")\n\n        if df is not None and not df.empty:\n            # Option to select from column or enter manually\n            input_method = st.radio(\n                \"Select bioinformatics ID source:\",\n                [\"None\", \"Enter manually\", \"Select from column\"],\n                horizontal=True,\n                key=\"bioinfo_id_method\",\n            )\n\n            if input_method == \"Select from column\":\n                column = st.selectbox(\n                    \"Select column containing bioinformatics ID:\",\n                    df.columns.tolist(),\n                    key=\"bioinfo_id_column\",\n                )\n                return column\n            elif \"Enter manually\" == input_method:\n                return st.text_input(\n                    \"Enter bioinformatics ID:\",\n                    help=\"Identifier for the bioinformatics run.\",\n                    key=\"bioinfo_id_text\",\n                )\n        else:\n            # Option to select from column or enter manually\n            input_method = st.radio(\n                \"Select bioinformatics ID source:\",\n                [\"None\", \"Enter manually\"],\n                horizontal=True,\n                key=\"bioinfo_id_method\",\n            )\n            # No file uploaded, only allow manual entry or none\n            if \"Enter manually\" == input_method:\n                return st.text_input(\n                    \"Enter bioinformatics ID:\",\n                    help=\"Identifier for the bioinformatics run.\",\n                    key=\"bioinfo_id_text\",\n                )\n\n    def transform_and_save_data(\n        self,\n        df,\n        bioinfo_id,\n        mapped_fields,\n        selected_optional_fields,\n        selected_additional_fields,\n    ):\n        st.subheader(\"Transform Data\")\n        if st.button(\"Transform Data\"):\n            # Validate required fields\n            errors = []\n\n            if not bioinfo_id or (\n                isinstance(bioinfo_id, str) and not bioinfo_id.strip()\n            ):\n                bioinfo_id = None\n                # errors.append(\"Bioinformatics ID is required.\")\n\n            if not mapped_fields:\n                errors.append(\n                    \"Field mapping is required. Please upload a file and map the fields.\"\n                )\n\n            if selected_optional_fields == \"Error\":\n                errors.append(\"There was an error with the optional fields selection.\")\n\n            if errors:\n                for error in errors:\n                    st.error(error)\n            else:\n                # All validations passed, proceed with transformation\n                transformed_df = transform_mhap_info(\n                    df.astype(object) if df is not None else None,\n                    bioinfo_id,\n                    mapped_fields,\n                    selected_optional_fields,\n                    selected_additional_fields,\n                )\n                st.session_state[session_name] = transformed_df\n                try:\n                    st.success(\"Microhaplotype Information has been saved!\")\n                except Exception as e:\n                    st.error(f\"Error saving Microhaplotype Information: {e}\")\n\n    def display_microhaplotype_info(self, toggle_text):\n        if session_name in st.session_state:\n            preview = st.toggle(toggle_text)\n            if preview:\n                st.write(f\"Current {title}:\")\n                st.json(st.session_state[session_name])\n\n    def run(self):\n        (\n            df,\n            mapped_fields,\n            selected_optional_fields,\n            selected_additional_fields,\n        ) = load_data(\n            required_fields,\n            required_alternate_fields,\n            optional_fields,\n            optional_alternate_fields,\n        )\n        # Get bioinformatics ID input\n        bioinfo_id = self.bioinfo_id_input(df)\n        # Transform and save data\n        self.transform_and_save_data(\n            df,\n            bioinfo_id,\n            mapped_fields,\n            selected_optional_fields,\n            selected_additional_fields,\n        )\n        # Display current panel information\n        self.display_microhaplotype_info(f\"Preview {title}\")\n\n\nif __name__ in (\"__main__\", \"__page__\"):\n    render_header()\n    st.subheader(\"Microhaplotype Information Converter\", divider=\"gray\")\n    schema_fields = load_schema()\n    required_fields = schema_fields[\"mhap_info\"][\"required\"]\n    required_alternate_fields = schema_fields[\"mhap_info\"][\"required_alternatives\"]\n    optional_fields = schema_fields[\"mhap_info\"][\"optional\"]\n    optional_alternate_fields = schema_fields[\"mhap_info\"][\"optional_alternatives\"]\n    app = MicrohaplotypeInfoPage(\n        required_fields,\n        required_alternate_fields,\n        optional_fields,\n        optional_alternate_fields,\n    )\n    if session_name in st.session_state:\n        st.success(\n            f\"Your {title} has already been saved during a\" \" previous run of this page\"\n        )\n        app.display_microhaplotype_info(f\"Preview previously stored {title}\")\n    app.run()\n",
                
                "app_pages/Panel_Information.py": "import streamlit as st\nimport json\nimport os\nimport pandas as pd\nfrom src.field_matcher import load_data\nfrom src.transformer import transform_panel_info\nfrom src.format_page import render_header\nfrom src.utils import load_schema\nfrom pmotools.pmo_builder.panel_information_to_pmo import merge_panel_info_dicts\n\nsession_name = \"panel_info\"\ntitle = \"panel information\"\n\n\nclass PanelManager:\n    def __init__(self, save_dir):\n        self.save_dir = save_dir\n\n    def check_save_dir(self):\n        \"\"\"Check dir exists or create it.\"\"\"\n        os.makedirs(self.save_dir, exist_ok=True)\n\n    def save_panel(self, panel_name, panel_data):\n        \"\"\"Save panel data to a JSON file.\"\"\"\n        with open(os.path.join(self.save_dir, f\"{panel_name}.json\"), \"w\") as f:\n            json.dump(panel_data, f)\n\n    def load_panel(self, panel_name):\n        \"\"\"Load panel data from a JSON file.\"\"\"\n        with open(os.path.join(self.save_dir, f\"{panel_name}.json\"), \"r\") as f:\n            return json.load(f)\n\n    def get_saved_panels(self):\n        \"\"\"Get a list of saved panel names.\"\"\"\n        return [\n            f.split(\".json\")[0]\n            for f in os.listdir(self.save_dir)\n            if f.endswith(\".json\")\n        ]\n\n\nclass PanelPage:\n    def __init__(\n        self,\n        save_dir,\n        panel_required_fields,\n        panel_required_alternate_fields,\n        panel_optional_fields,\n        panel_optional_alternate_fields,\n        genome_required_fields,\n        genome_required_alternate_fields,\n        genome_optional_fields,\n        genome_optional_alternate_fields,\n    ):\n        self.save_dir = save_dir\n        self.panel_manager = PanelManager(self.save_dir)\n        self.panel_manager.check_save_dir()\n\n        self.required_fields = panel_required_fields\n        self.required_alternate_fields = panel_required_alternate_fields\n        self.optional_fields = panel_optional_fields\n        self.optional_alternate_fields = panel_optional_alternate_fields\n\n        self.genome_required_fields = genome_required_fields\n        self.genome_required_alternate_fields = genome_required_alternate_fields\n        self.genome_optional_fields = genome_optional_fields\n        self.genome_optional_alternate_fields = genome_optional_alternate_fields\n\n    def load_saved_panel(self):\n        use_past = st.checkbox(\"Use a past version\")\n        if use_past:\n            saved_panels = self.panel_manager.get_saved_panels()\n            if saved_panels:\n                selected_panels = st.multiselect(\n                    \"Select saved panel(s) to load:\",\n                    saved_panels,\n                    help=\"Select one or more panels. If multiple are selected, they will be merged together.\",\n                )\n                if st.button(\"Load Panel(s)\"):\n                    if not selected_panels:\n                        st.warning(\"Please select at least one panel to load.\")\n                    elif len(selected_panels) == 1:\n                        # Single panel - just load it\n                        panel_data = self.panel_manager.load_panel(selected_panels[0])\n                        st.session_state[\"panel_info\"] = panel_data\n                        st.success(f\"Loaded panel: {selected_panels[0]}\")\n                    else:\n                        # Multiple panels - merge them\n                        if merge_panel_info_dicts is None:\n                            st.error(\n                                \"The merge_panel_info_dicts function could not be imported from pmotools. \"\n                                \"Please ensure pmotools is installed and the function is available.\"\n                            )\n                        else:\n                            try:\n                                # Load all selected panels\n                                panel_dicts = [\n                                    self.panel_manager.load_panel(panel_name)\n                                    for panel_name in selected_panels\n                                ]\n                                # Merge the panels\n                                merged_panel_data = merge_panel_info_dicts(panel_dicts)\n                                st.session_state[\"panel_info\"] = merged_panel_data\n                                st.success(\n                                    f\"Successfully merged {len(selected_panels)} panel(s): {', '.join(selected_panels)}\"\n                                )\n                            except Exception as e:\n                                st.error(f\"Error merging panels: {e}\")\n            else:\n                st.warning(\"No saved panels found.\")\n\n    def panel_id_input(self):\n        st.subheader(\"Panel Name\")\n\n        # Get unique panel names from library_sample_info if available\n        suggested_panels = []\n        if \"library_sample_info\" in st.session_state:\n            library_sample_info = st.session_state[\"library_sample_info\"]\n            try:\n                # Handle DataFrame\n                if isinstance(library_sample_info, pd.DataFrame):\n                    if \"panel_name\" in library_sample_info.columns:\n                        suggested_panels = sorted(\n                            library_sample_info[\"panel_name\"].dropna().unique().tolist()\n                        )\n                # Handle dict (could be a dict representation of DataFrame or nested structure)\n                elif isinstance(library_sample_info, dict):\n                    # Check if it's a dict with 'panel_name' as a key containing a list/Series\n                    if \"panel_name\" in library_sample_info:\n                        panel_data = library_sample_info[\"panel_name\"]\n                        if isinstance(panel_data, (list, pd.Series)):\n                            if isinstance(panel_data, pd.Series):\n                                suggested_panels = sorted(\n                                    panel_data.dropna().unique().tolist()\n                                )\n                            else:\n                                suggested_panels = sorted(\n                                    list(set([p for p in panel_data if p]))\n                                )\n                    # Check if values in dict are DataFrames with panel_name column\n                    else:\n                        for value in library_sample_info.values():\n                            if (\n                                isinstance(value, pd.DataFrame)\n                                and \"panel_name\" in value.columns\n                            ):\n                                suggested_panels.extend(\n                                    value[\"panel_name\"].dropna().unique().tolist()\n                                )\n                        suggested_panels = sorted(list(set(suggested_panels)))\n                # Handle list of dicts\n                elif isinstance(library_sample_info, list):\n                    panel_names = [\n                        item.get(\"panel_name\")\n                        for item in library_sample_info\n                        if isinstance(item, dict) and item.get(\"panel_name\")\n                    ]\n                    suggested_panels = sorted(list(set(panel_names)))\n            except Exception:\n                # If extraction fails, just continue without suggestions\n                pass\n\n        # If we have suggested panels, show a selectbox with option to enter custom\n        if suggested_panels:\n            panel_options = suggested_panels + [\"Enter custom panel name\"]\n            selected_option = st.selectbox(\n                \"Select panel name or enter custom:\",\n                panel_options,\n                index=0,  # Default to first panel\n                help=f\"Suggested panel names from library sample info: {', '.join(suggested_panels)}\",\n            )\n\n            if selected_option == \"Enter custom panel name\":\n                return st.text_input(\n                    \"Enter panel name:\", help=\"Identifier name for the panel.\"\n                )\n            else:\n                return selected_option\n        else:\n            return st.text_input(\n                \"Enter panel name:\", help=\"Identifier name for the panel.\"\n            )\n\n    def add_genome_information(self):\n        st.subheader(\"Add Genome Information (Optional)\")\n        st.write(\n            \"Note: Genome information is required if you have included genomic locations above.\"\n        )\n        genome_input_mode = st.radio(\n            \"Genome input method:\",\n            [\"Enter Manually\", \"Upload File\"],\n            horizontal=True,\n        )\n\n        if genome_input_mode == \"Enter Manually\":\n            genome_name = st.text_input(\"Name:\", help=\"Name of the genome.\")\n            taxon_id = st.number_input(\n                \"Taxon ID:\",\n                min_value=1,\n                step=1,\n                value=None,  # or value=None if you want it to start empty\n                format=\"%d\",\n                help=\"The NCBI taxonomy number.\",\n            )\n            version = st.text_input(\"Genome Version:\", help=\"The genome version.\")\n            genome_url = st.text_input(\"URL:\", help=\"A link to the genome file.\")\n            gff_url = st.text_input(\n                \"GFF URL (Optional):\", help=\"A link to the genome's annotation file\"\n            )\n            genome_info = {\n                \"name\": genome_name,\n                \"taxon_id\": [taxon_id],\n                \"url\": genome_url,\n                \"genome_version\": version,\n            }\n            if gff_url:\n                genome_info[\"gff_url\"] = gff_url\n            return genome_info\n\n        else:  # Upload File\n            (\n                df,\n                mapped_fields,\n                selected_optional_fields,\n                selected_additional_fields,\n            ) = load_data(\n                self.genome_required_fields,\n                self.genome_required_alternate_fields,\n                self.genome_optional_fields,\n                self.genome_optional_alternate_fields,\n                key_suffix=\"genome\",\n            )\n            if df is not None and mapped_fields is not None:\n                # Build list of genome info dicts from the uploaded file\n                genome_info_list = []\n                for _, row in df.iterrows():\n                    genome_entry = {}\n                    # Map required/optional fields\n                    for pmo_field, input_field in mapped_fields.items():\n                        if input_field and input_field in df.columns:\n                            if pmo_field == \"taxon_id\":\n                                genome_entry[pmo_field] = [row[input_field]]\n                            else:\n                                genome_entry[pmo_field] = row[input_field]\n                    # Map optional fields if present\n                    if selected_optional_fields:\n                        for pmo_field, input_field in selected_optional_fields.items():\n                            if input_field and input_field in df.columns:\n                                genome_entry[pmo_field] = row[input_field]\n                    # Add any additional fields selected\n                    if selected_additional_fields:\n                        for field in selected_additional_fields:\n                            if field in df.columns:\n                                genome_entry[field] = row[field]\n                    genome_info_list.append(genome_entry)\n                return genome_info_list\n            return None\n\n    def transform_and_save_data(\n        self,\n        df,\n        panel_ID,\n        field_mapping,\n        genome_info,\n        selected_optional_fields,\n        selected_additional_fields,\n    ):\n        st.subheader(\"Transform Data\")\n        if st.button(\"Transform Data\"):\n            errors = []\n\n            if not panel_ID or not panel_ID.strip():\n                errors.append(\"Panel ID is required.\")\n\n            if not field_mapping:\n                errors.append(\n                    \"Field mapping is required. Please upload a file and map the fields.\"\n                )\n\n            # Validate genome_info depending on type\n            if isinstance(genome_info, list):\n                # Uploaded list of dicts \u2014 skip blank checks, trust the upload\n                if len(genome_info) == 0:\n                    genome_info = None\n            elif isinstance(genome_info, dict):\n                print(genome_info[\"taxon_id\"])\n                # Manually entered \u2014 check if all blank\n                genome_info_all_blank = (\n                    \"\" == genome_info[\"name\"].strip()\n                    and [None] == genome_info[\"taxon_id\"]\n                    and \"\" == genome_info[\"genome_version\"].strip()\n                    and \"\" == genome_info[\"url\"].strip()\n                )\n                if genome_info_all_blank:\n                    genome_info = None\n                else:\n                    if not genome_info.get(\"name\") or not genome_info[\"name\"].strip():\n                        errors.append(\"Genome name is required.\")\n                    if (\n                        not genome_info.get(\"taxon_id\")\n                        or [None] == genome_info[\"taxon_id\"]\n                    ):\n                        errors.append(\"Taxon ID is required.\")\n                    if (\n                        not genome_info.get(\"genome_version\")\n                        or not genome_info[\"genome_version\"].strip()\n                    ):\n                        errors.append(\"Genome version is required.\")\n                    if not genome_info.get(\"url\") or not genome_info[\"url\"].strip():\n                        errors.append(\"Genome URL is required.\")\n\n            if selected_optional_fields == \"Error\":\n                errors.append(\"There was an error with the optional fields selection.\")\n\n            if errors:\n                for error in errors:\n                    st.error(error)\n            else:\n                transformed_df = transform_panel_info(\n                    df,\n                    panel_ID,\n                    field_mapping,\n                    genome_info,\n                    selected_optional_fields,\n                    selected_additional_fields,\n                )\n                st.session_state[\"panel_info\"] = transformed_df\n                try:\n                    self.panel_manager.save_panel(panel_ID, transformed_df)\n                    st.success(f\"Panel '{panel_ID}' has been saved!\")\n                except Exception as e:\n                    st.error(f\"Error saving panel: {e}\")\n\n    def display_panel_info(self, toggle_text):\n        if session_name in st.session_state:\n            preview = st.toggle(toggle_text)\n            if preview:\n                st.write(f\"Current {title}:\")\n                st.json(st.session_state[session_name])\n\n    def run(self):\n        # Load past panel if applicable\n        self.load_saved_panel()\n        # Input for panel ID\n        panel_id = self.panel_id_input()\n\n        (\n            df,\n            mapped_fields,\n            selected_optional_fields,\n            selected_additional_fields,\n        ) = load_data(\n            self.required_fields,\n            self.required_alternate_fields,\n            self.optional_fields,\n            self.optional_alternate_fields,\n        )\n\n        # Add genome information\n        genome_info = self.add_genome_information()\n\n        # Transform and save data\n        self.transform_and_save_data(\n            df,\n            panel_id,\n            mapped_fields,\n            genome_info,\n            selected_optional_fields,\n            selected_additional_fields,\n        )\n\n        # Display current panel information\n        self.display_panel_info(f\"Preview {title}\")\n\n\n# Initialize and run the app\nif __name__ in (\"__main__\", \"__page__\"):\n    render_header()\n    st.subheader(\"Panel Information Converter\", divider=\"gray\")\n    schema_fields = load_schema()\n    required_fields = schema_fields[\"panel_info\"][\"required\"]\n    required_alternate_fields = schema_fields[\"panel_info\"][\"required_alternatives\"]\n    optional_fields = schema_fields[\"panel_info\"][\"optional\"]\n    optional_alternate_fields = schema_fields[\"panel_info\"][\"optional_alternatives\"]\n\n    genome_required_fields = schema_fields[\"targeted_genomes\"][\"required\"]\n    genome_required_alternate_fields = schema_fields[\"targeted_genomes\"][\n        \"required_alternatives\"\n    ]\n    genome_optional_fields = schema_fields[\"targeted_genomes\"][\"optional\"]\n    genome_optional_alternate_fields = schema_fields[\"targeted_genomes\"][\n        \"optional_alternatives\"\n    ]\n\n    app = PanelPage(\n        os.path.join(os.getcwd(), \"saved_panels\"),\n        required_fields,\n        required_alternate_fields,\n        optional_fields,\n        optional_alternate_fields,\n        genome_required_fields,\n        genome_required_alternate_fields,\n        genome_optional_fields,\n        genome_optional_alternate_fields,\n    )\n    if session_name in st.session_state:\n        st.success(\n            f\"Your {title} has already been saved during a\" \" previous run of this page\"\n        )\n        app.display_panel_info(f\"Preview previously stored {title}\")\n    app.run()\n",
